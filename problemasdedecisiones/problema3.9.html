<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Póliza</title>

<link rel="stylesheet" href="styles/estilos.css">

</head>
<body>

<div class="formulario">

    <img src="images/seguro.png" alt="Icono" class="icono">

    <h1>Póliza de seguro</h1>

    <label>Tipo de póliza (A o B):</label>
    <input type="text" id="poliza">

    <label>¿Bebe alcohol? (si/no):</label>
    <input type="text" id="alcohol">

    <label>¿Usa lentes? (si/no):</label>
    <input type="text" id="lentes">

    <label>¿Tiene enfermedad? (si/no):</label>
    <input type="text" id="enfermedad">

    <label>Edad:</label>
    <input type="text" id="edadPoliza">

    <button onclick="calcularPoliza()">Calcular</button>

    <p id="resultPoliza"></p>

    <button class="btn-menu" onclick="window.location.href='index.html'">
        Volver al menú principal
    </button>

</div>

<script src="scripts/problemas.js"></script>

</html>
